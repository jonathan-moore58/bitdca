<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="200" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="600" cy="315" rx="500" ry="250" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>
  <!-- Bitcoin symbol watermark -->
  <text x="900" y="420" font-family="Arial, sans-serif" font-size="300" font-weight="bold" fill="#ffffff" opacity="0.03">&#x20bf;</text>
  <!-- Orange accent bar -->
  <rect x="100" y="330" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="100" y="300" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="white">BitDCA</text>
  <!-- Subtitle -->
  <text x="100" y="380" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#a1a1aa">Auto-Stack on Bitcoin L1</text>
  <!-- Description -->
  <text x="100" y="430" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#71717a">Fully on-chain Dollar-Cost Averaging via OPNet</text>
  <!-- DCA icon -->
  <g transform="translate(950, 200)">
    <rect width="140" height="140" rx="28" fill="url(#accent)" opacity="0.9"/>
    <!-- B symbol -->
    <text x="70" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">B</text>
    <!-- Arrows -->
    <path d="M20 25l15-15v10h30v10h-30v10z" fill="white" opacity="0.6"/>
    <path d="M120 115l-15 15v-10h-30v-10h30v-10z" fill="white" opacity="0.6"/>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.8"/>
  <!-- Tags -->
  <g transform="translate(100, 500)">
    <rect width="80" height="30" rx="6" fill="#f97316" opacity="0.15"/>
    <text x="40" y="20" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle">OPNet</text>
    <rect x="95" width="90" height="30" rx="6" fill="#f97316" opacity="0.15"/>
    <text x="140" y="20" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle">Bitcoin L1</text>
    <rect x="200" width="60" height="30" rx="6" fill="#f97316" opacity="0.15"/>
    <text x="230" y="20" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle">DeFi</text>
    <rect x="275" width="100" height="30" rx="6" fill="#f97316" opacity="0.15"/>
    <text x="325" y="20" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle">MotoSwap</text>
  </g>
</svg>
